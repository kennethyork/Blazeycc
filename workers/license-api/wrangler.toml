name = "blazeycc-license"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
GITHUB_USERNAME = "theKennethy"
STORAGE_LIMIT_MB = "5120"  # 5GB per user

[[d1_databases]]
binding = "DB"
database_name = "blazeycc-licenses"
database_id = "3112b81a-8a4d-410e-80db-623c2fe00087"

# R2 Cloud Storage - Uncomment after enabling R2 in Cloudflare Dashboard
# and creating bucket named "blazeycc-recordings"
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "blazeycc-recordings"

# Secrets (set via wrangler secret put):
# - LICENSE_SECRET: Your HMAC secret for generating keys
# - GITHUB_TOKEN: GitHub personal access token with read:user and read:org scope
# - ADMIN_KEY: Secret key for admin API endpoints
