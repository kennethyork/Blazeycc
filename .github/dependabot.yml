version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "electron*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
