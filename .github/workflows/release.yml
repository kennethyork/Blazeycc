name: Unified Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.10.0)'
        required: false
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run build:linux -- --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Windows
        run: npm run build:win -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac -- --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm install

      - name: Build mobile web assets
        working-directory: ./mobile
        run: npm run build

      - name: Add Android platform
        working-directory: ./mobile
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: ./mobile
        run: npx cap sync android

      - name: Patch AndroidManifest.xml
        working-directory: ./mobile/android/app/src/main
        run: |
          MANIFEST="AndroidManifest.xml"
          # Add windowSoftInputMode for keyboard handling
          sed -i 's|android:launchMode="singleTask"|android:launchMode="singleTask" android:windowSoftInputMode="adjustResize"|g' "$MANIFEST"
          # Add hardware acceleration
          sed -i 's|<application|<application android:hardwareAccelerated="true"|g' "$MANIFEST"
          # Add RECORD_AUDIO permission if missing
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's|</manifest>|<uses-permission android:name="android.permission.RECORD_AUDIO" />\n</manifest>|g' "$MANIFEST"
          fi
          # Add usesCleartextTraffic for Ollama HTTP
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|g' "$MANIFEST"

      - name: Generate signing keystore
        working-directory: ./mobile/android/app
        run: |
          keytool -genkey -v -keystore release.keystore -alias blazeycc -keyalg RSA -keysize 2048 -validity 10000 -storepass blazeycc -keypass blazeycc -dname "CN=Blazeycc"

      - name: Build signed Android Release APK
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$PWD/app/release.keystore -Pandroid.injected.signing.store.password=blazeycc -Pandroid.injected.signing.key.alias=blazeycc -Pandroid.injected.signing.key.password=blazeycc

      - name: Build Android Debug APK
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/app/build/outputs/apk/release/*.apk

  release:
    needs: [build-linux, build-windows, build-mac, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-builds'

      - name: Display structure
        run: ls -R artifacts

      - name: Create Unified Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-builds/*
            artifacts/windows-builds/*
            artifacts/mac-builds/*
            artifacts/android-builds/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
